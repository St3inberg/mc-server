<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — NetzTech</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <nav>
    <a href="/" class="nav-logo"><i class="fa-solid fa-bolt"></i> NetzTech</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/store.html">Store</a></li>
    </ul>
    <div class="nav-actions" id="nav-actions"></div>
  </nav>

  <div class="form-container">
    <div class="form-card">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your NetzTech account</p>
      <div id="alert" class="hidden"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-lg form-full" id="submit-btn">Sign in</button>
      </form>
      <div class="form-footer">
        Don't have an account? <a href="/register.html">Register</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    if (getToken()) window.location.href = '/dashboard.html';

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });
        if (!res) return;
        const data = await res.json();
        if (res.ok) {
          saveAuth(data);
          const redirect = new URLSearchParams(location.search).get('redirect') || '/dashboard.html';
          window.location.href = redirect;
        } else {
          showAlert(data.error);
          btn.disabled = false;
          btn.textContent = 'Sign in';
        }
      } catch {
        showAlert('Network error — please try again.');
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
