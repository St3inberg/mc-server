<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — NetzTech</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <nav>
    <a href="/" class="nav-logo"><i class="fa-solid fa-bolt"></i> NetzTech</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/store.html">Store</a></li>
    </ul>
    <div class="nav-actions" id="nav-actions"></div>
  </nav>

  <div class="form-container">
    <div class="form-card">
      <h1>Join NetzTech</h1>
      <p class="subtitle">Create your account to unlock exclusive perks</p>
      <div id="alert" class="hidden"></div>
      <form id="register-form">
        <div class="form-group">
          <label for="minecraft_username">Minecraft Username</label>
          <input type="text" id="minecraft_username" required minlength="3" maxlength="16"
                 pattern="[a-zA-Z0-9_]+" title="Letters, numbers, and underscores only"
                 autocomplete="username" placeholder="YourIGN">
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="8"
                 autocomplete="new-password" placeholder="At least 8 characters">
        </div>
        <button type="submit" class="btn btn-primary btn-lg form-full" id="submit-btn">Create account</button>
      </form>
      <div class="form-footer">
        Already have an account? <a href="/login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    if (getToken()) window.location.href = '/dashboard.html';

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({
            minecraft_username: document.getElementById('minecraft_username').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        if (!res) return;
        const data = await res.json();
        if (res.ok) {
          saveAuth(data);
          window.location.href = '/dashboard.html';
        } else {
          showAlert(data.error);
          btn.disabled = false;
          btn.textContent = 'Create account';
        }
      } catch {
        showAlert('Network error — please try again.');
        btn.disabled = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
