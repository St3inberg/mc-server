server {
    listen 80;
    server_name playnetztech.xyz www.playnetztech.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name playnetztech.xyz www.playnetztech.xyz;

    ssl_certificate     /etc/letsencrypt/live/playnetztech.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/playnetztech.xyz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    gzip on;
    gzip_types text/css application/javascript application/json text/plain;

    # Proxy everything to the Node.js app (serves both API and static files)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Needed for Stripe webhook raw body
        proxy_request_buffering off;
    }
}
